
font_family      Hack
bold_font        Hack
italic_font      Hack
bold_italic_font Hack
font_size        11
# foreground #FFFFFF      
# background #000000      
# selection_background #9083DB
# selection_foreground #FFFFFF
# color0 #000000
# color1 #9083DB         
# color2 #B0BDE7        
# color3 #DBDCFA         
# color4 #E7EAF9          
# color5 #9083DB
# color6 #B0BDE7
# color7 #FFFFFF
# color8  #444444
# color9  #A87BFF
# color10 #C5D3FF
# color11 #E5E6FF
# color12 #F0F2FF
# color13 #A87BFF
# color14 #C5D3FF
# color15 #FFFFFF

background_opacity 0.85
dynamic_background_opacity yes
background_blur 8        


window_margin_width 8
window_padding_width 8
window_border_width 1
window_border_color #9083DB
round_window_corners yes   

remember_window_size yes
initial_window_width 800
initial_window_height 500

cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 15


enable_audio_bell no
visual_bell_duration 0.3
# visual_bell_color #9083DB

scrollback_lines 10000
scrollback_pager less +G -R


map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+up scroll_line_up
map ctrl+shift+down scroll_line_down
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end
map ctrl+shift+f1 change_font_size all -1
map ctrl+shift+f2 change_font_size all +1
map ctrl+shift+f3 change_font_size all 0

linux_display_server wayland
shell_integration enabled


# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME